name: Deploy to GitHub Pages

# Builds the static export and publishes it to the `gh-pages` branch, which
# GitHub Pages serves. Publishing via a plain push (built-in GITHUB_TOKEN)
# avoids the `github-pages` deployment environment, whose branch gate can leave
# deploys stuck "waiting" on non-default branches.

on:
  push:
    branches: [main, feat/cinematic-mural-site]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      NEXT_PUBLIC_BASE_PATH: "/imv4"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to gh-pages
        run: |
          touch out/.nojekyll
          cd out
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
